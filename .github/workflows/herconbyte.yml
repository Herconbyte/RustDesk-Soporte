name: Herconbyte Build

# Workflow dedicado a Herconbyte. Compila Windows + macOS (aarch64 + x86_64) + Linux + Android.
# Se dispara manualmente desde la pestania Actions de GitHub (boton "Run workflow")
# o automaticamente al pushear a 'main' (no a 'master' para evitar build accidental).
#
# NO firma ni notariza nada. Los binarios resultantes son "sin firmar",
# listos para empaquetar con Inno Setup (Windows) o distribuir directo (Mac/Linux/Android).

on:
  workflow_dispatch:
    inputs:
      build-windows:
        description: 'Compilar Windows x86_64 (.exe + DLLs)'
        type: boolean
        default: true
      build-macos-arm:
        description: 'Compilar macOS aarch64 (M1/M2/M3, .dmg)'
        type: boolean
        default: true
      build-macos-intel:
        description: 'Compilar macOS x86_64 (Intel Macs, .dmg)'
        type: boolean
        default: true
      build-linux:
        description: 'Compilar Linux x86_64 (.deb + .AppImage)'
        type: boolean
        default: true
      build-android:
        description: 'Compilar Android arm64 (.apk)'
        type: boolean
        default: true

env:
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  CARGO_NDK_VERSION: "3.1.2"
  NDK_VERSION: "r28c"
  LLVM_VERSION: "15.0.6"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"

jobs:
  generate-bridge:
    if: inputs.build-windows || inputs.build-macos-arm || inputs.build-macos-intel || inputs.build-linux
    uses: ./.github/workflows/bridge.yml

  build-windows:
    name: Windows x86_64
    if: inputs.build-windows
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - uses: actions/download-artifact@v4
        with: { name: bridge-artifact, path: ./ }

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with: { version: "15.0.6" }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with: { prefix-key: "hcb-windows" }

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with: { vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }

      - name: vcpkg install (con ffmpeg forzado para hwcodec)
        env: { VCPKG_DEFAULT_TRIPLET: x64-windows-static }
        run: |
          set -e
          # 1) Manifest install (lee vcpkg.json del repo)
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
          # 2) Forzar ffmpeg via overlay port (por si el manifest no lo activo)
          $VCPKG_ROOT/vcpkg install "ffmpeg[amf,nvcodec,qsv]" --triplet x64-windows-static --overlay-ports=./res/vcpkg --x-install-root="$VCPKG_ROOT/installed"
          # 3) Verificar headers criticos antes de pasar a build
          echo "=== Verificar headers ffmpeg ==="
          ls "$VCPKG_ROOT/installed/x64-windows-static/include/libavcodec/avcodec.h" || (echo "FFMPEG HEADERS NO INSTALADOS" && exit 1)
        shell: bash

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: "${{ env.FLUTTER_VERSION }}" }

      - run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Build (con hwcodec - vcpkg instala ffmpeg con x64-windows-static)
        env: { VCPKG_ROOT: "${{ github.workspace }}/vcpkg" }
        run: python3 ./build.py --portable --flutter --hwcodec
        shell: bash

      - name: Package
        run: |
          mkdir -p dist-windows
          cp -r ./flutter/build/windows/x64/runner/Release/* dist-windows/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: herconbyte-windows-x86_64
          path: dist-windows/
          retention-days: 14

  build-macos-arm:
    name: macOS aarch64
    if: inputs.build-macos-arm
    needs: [generate-bridge]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - uses: actions/download-artifact@v4
        with: { name: bridge-artifact, path: ./ }

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with: { prefix-key: "hcb-macos-arm" }

      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: "${{ env.FLUTTER_VERSION }}" }

      - run: brew install yasm cmake create-dmg pkg-config

      - name: Install NASM 2.16 (brew install nasm da 3.x que rompe aom)
        run: |
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          sudo cp nasm-2.16.03/ndisasm /usr/local/bin/ndisasm
          nasm --version

      - name: Setup vcpkg (igual que Mac Intel, brew no tiene libyuv)
        uses: lukka/run-vcpkg@v11
        with: { vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }

      - name: vcpkg install (sin triplet, default = arm64-osx, instala ffmpeg via vcpkg.json)
        run: $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Build (con hwcodec)
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.3"
          VCPKG_ROOT: "${{ github.workspace }}/vcpkg"
        run: ./build.py --flutter --hwcodec --unix-file-copy-paste

      - name: Create unsigned DMG
        run: |
          create-dmg --icon "RustDesk.app" 200 190 \
            --hide-extension "RustDesk.app" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            herconbyte-aarch64.dmg \
            ./flutter/build/macos/Build/Products/Release/RustDesk.app

      - uses: actions/upload-artifact@v4
        with:
          name: herconbyte-macos-aarch64
          path: herconbyte-aarch64.dmg
          retention-days: 14

  build-macos-intel:
    name: macOS x86_64 (Intel)
    if: inputs.build-macos-intel
    needs: [generate-bridge]
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - uses: actions/download-artifact@v4
        with: { name: bridge-artifact, path: ./ }

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with: { prefix-key: "hcb-macos-intel" }

      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: "${{ env.FLUTTER_VERSION }}" }

      - run: brew install nasm yasm cmake create-dmg

      - name: Setup vcpkg (macOS Intel necesita vcpkg, homebrew solo es para arm64)
        uses: lukka/run-vcpkg@v11
        with: { vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }

      - name: vcpkg install (sin triplet, default = x64-osx, instala ffmpeg)
        run: $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Build (con hwcodec)
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.14"
          VCPKG_ROOT: "${{ github.workspace }}/vcpkg"
        run: ./build.py --flutter --hwcodec --unix-file-copy-paste

      - name: Create unsigned DMG
        run: |
          create-dmg --icon "RustDesk.app" 200 190 \
            --hide-extension "RustDesk.app" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            herconbyte-x86_64.dmg \
            ./flutter/build/macos/Build/Products/Release/RustDesk.app

      - uses: actions/upload-artifact@v4
        with:
          name: herconbyte-macos-x86_64
          path: herconbyte-x86_64.dmg
          retention-days: 14

  build-linux:
    name: Linux x86_64
    if: inputs.build-linux
    needs: [generate-bridge]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - uses: actions/download-artifact@v4
        with: { name: bridge-artifact, path: ./ }

      - name: Install system deps (con libva-dev + libxfixes-dev para hwcodec)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            curl wget unzip xz-utils nasm yasm libgtk-3-dev \
            clang cmake libclang-dev ninja-build pkg-config \
            libsodium-dev libssl-dev libpulse-dev libdbus-1-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libayatana-appindicator3-dev libnss3 libxcursor1 \
            libasound2-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libunwind-dev libunwind8 libpam0g-dev libva-dev libxfixes-dev \
            gcc-multilib g++-multilib rpm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with: { prefix-key: "hcb-linux" }

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with: { vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }

      - name: vcpkg install
        env: { VCPKG_DEFAULT_TRIPLET: x64-linux }
        run: $VCPKG_ROOT/vcpkg install --triplet x64-linux --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: "${{ env.FLUTTER_VERSION }}" }

      - run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Build (con hwcodec)
        env: { VCPKG_ROOT: "${{ github.workspace }}/vcpkg" }
        run: |
          python3 ./build.py --flutter --hwcodec --unix-file-copy-paste
          ls -la rustdesk-*.deb || true

      - uses: actions/upload-artifact@v4
        with:
          name: herconbyte-linux-x86_64
          path: |
            rustdesk-*.deb
            rustdesk-*.rpm
            rustdesk-*.AppImage
          retention-days: 14
          if-no-files-found: warn

  build-android:
    name: Android arm64
    if: inputs.build-android
    needs: [generate-bridge]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - uses: actions/download-artifact@v4
        with: { name: bridge-artifact, path: ./ }

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            curl wget unzip xz-utils nasm yasm clang cmake ninja-build \
            pkg-config libsodium-dev libssl-dev gcc-multilib g++-multilib

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with: { prefix-key: "hcb-android" }

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: "${{ env.ANDROID_FLUTTER_VERSION }}" }

      - name: Setup vcpkg (necesario para cross-compile a Android)
        uses: lukka/run-vcpkg@v11
        with: { vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }

      - run: cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked

      - name: Build Android deps (vcpkg cross-compile)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: "${{ github.workspace }}/vcpkg"
        run: bash flutter/build_android_deps.sh arm64-v8a

      - name: Build librustdesk.so para Android arm64
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: "${{ github.workspace }}/vcpkg"
        run: |
          rustup target add aarch64-linux-android
          cargo ndk --target aarch64-linux-android --platform 21 -- build --release --features flutter
          # Copiar la lib al lugar que flutter espera
          mkdir -p flutter/android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/liblibrustdesk.so flutter/android/app/src/main/jniLibs/arm64-v8a/

      - name: Build APK
        run: |
          cd flutter
          flutter pub get
          flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: herconbyte-android-arm64
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
          if-no-files-found: warn
