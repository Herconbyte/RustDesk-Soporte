name: Herconbyte Build

# Workflow dedicado a Herconbyte. Compila Windows + macOS (aarch64) bajo demanda.
# Se dispara manualmente desde la pestania Actions de GitHub (boton "Run workflow")
# o automaticamente al pushear a la rama 'main' o crear un tag 'v*'.
#
# NO firma ni notariza nada (no tenemos Apple Developer ID ni cert Windows).
# Los binarios resultantes son los mismos "sin firmar" que ya estabas usando,
# pero ahora con TUS cambios al codigo fuente compilados adentro.

on:
  workflow_dispatch:
    inputs:
      build-windows:
        description: 'Compilar Windows x86_64'
        type: boolean
        default: true
      build-macos:
        description: 'Compilar macOS aarch64 (Apple Silicon)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"

jobs:
  generate-bridge:
    if: github.event_name == 'push' || inputs.build-windows || inputs.build-macos
    uses: ./.github/workflows/bridge.yml

  build-windows:
    name: Windows x86_64
    if: github.event_name == 'push' || inputs.build-windows
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache vars
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge artifacts
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15.0.6"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "herconbyte-windows"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Build RustDesk
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: python3 ./build.py --portable --hwcodec --flutter --unix-file-copy-paste
        shell: bash

      - name: Package output
        run: |
          mkdir -p dist-windows
          cp -r ./flutter/build/windows/x64/runner/Release/* dist-windows/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: herconbyte-windows-x86_64
          path: dist-windows/
          retention-days: 14

  build-macos:
    name: macOS aarch64
    if: inputs.build-macos
    needs: [generate-bridge]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge artifacts
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "herconbyte-macos"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install brew deps
        run: brew install nasm yasm cmake create-dmg

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Build RustDesk for macOS
        run: ./build.py --flutter
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.14"

      - name: Create unsigned DMG
        run: |
          create-dmg --icon "RustDesk.app" 200 190 \
            --hide-extension "RustDesk.app" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            herconbyte-aarch64.dmg \
            ./flutter/build/macos/Build/Products/Release/RustDesk.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: herconbyte-macos-aarch64
          path: herconbyte-aarch64.dmg
          retention-days: 14
